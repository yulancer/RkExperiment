services:
  kafka:
    image: apache/kafka:3.9.2
    container_name: rk-kafka
    hostname: kafka
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
      KAFKA_NUM_PARTITIONS: 3

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: rk-kafka-ui
    depends_on:
      - kafka
    ports:
      - "18080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: rk-demo
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  consumer-a:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PROJECT: src/RkExperiment.ConsumerA/RkExperiment.ConsumerA.csproj
    environment:
      Kafka__BootstrapServers: kafka:9092
      Kafka__InputQueue: rk.consumer-a.input
      Kafka__GroupId: rk-consumer-a
      Kafka__AllowAutoCreateTopics: 'true'
      Service__InstanceName: consumer-a-1
    depends_on:
      - kafka

  consumer-b-1:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PROJECT: src/RkExperiment.ConsumerB/RkExperiment.ConsumerB.csproj
    environment:
      Kafka__BootstrapServers: kafka:9092
      Kafka__InputQueue: rk.consumer-b.input
      Kafka__GroupId: rk-consumer-b
      Kafka__AllowAutoCreateTopics: 'true'
      Service__InstanceName: consumer-b-1
      Service__ProcessingDelayMs: '500'
    depends_on:
      - kafka

  consumer-b-2:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PROJECT: src/RkExperiment.ConsumerB/RkExperiment.ConsumerB.csproj
    environment:
      Kafka__BootstrapServers: kafka:9092
      Kafka__InputQueue: rk.consumer-b.input
      Kafka__GroupId: rk-consumer-b
      Kafka__AllowAutoCreateTopics: 'true'
      Service__InstanceName: consumer-b-2
      Service__ProcessingDelayMs: '500'
    depends_on:
      - kafka

  publisher:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PROJECT: src/RkExperiment.Publisher/RkExperiment.Publisher.csproj
    environment:
      Kafka__BootstrapServers: kafka:9092
      Publisher__SourceService: publisher
      Publisher__Count: '12'
      Publisher__DelayMs: '300'
    depends_on:
      - kafka
      - consumer-a
      - consumer-b-1
      - consumer-b-2
    profiles:
      - publisher